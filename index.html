<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZ-104 // Azure Administrator Study Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-tertiary: #1a1a28;
  --bg-card: #161622;
  --bg-hover: #1e1e30;
  --accent-cyan: #00e5ff;
  --accent-blue: #4d7cff;
  --accent-purple: #a855f7;
  --accent-green: #22c55e;
  --accent-orange: #f59e0b;
  --accent-red: #ef4444;
  --accent-pink: #ec4899;
  --text-primary: #e8e8f0;
  --text-secondary: #8888a0;
  --text-muted: #55556a;
  --border: #2a2a3e;
  --glow-cyan: 0 0 20px rgba(0, 229, 255, 0.15);
  --glow-purple: 0 0 20px rgba(168, 85, 247, 0.15);
  --glow-green: 0 0 20px rgba(34, 197, 94, 0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent-cyan); }

/* Background pattern */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0,229,255,0.06), transparent),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(168,85,247,0.04), transparent);
  pointer-events: none;
  z-index: 0;
}

/* Grid overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}

#app { position: relative; z-index: 1; }

/* ============ HEADER ============ */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,10,15,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
}

.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 1.1rem;
  color: var(--accent-cyan);
  letter-spacing: -0.5px;
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: var(--bg-primary);
  font-weight: 900;
}

.logo span { color: var(--text-muted); font-weight: 400; }

.nav-tabs {
  display: flex;
  gap: 4px;
}

.nav-tab {
  padding: 8px 18px;
  border-radius: 8px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-family: 'Outfit', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.nav-tab:hover { color: var(--text-primary); background: var(--bg-tertiary); }
.nav-tab.active { color: var(--accent-cyan); background: rgba(0,229,255,0.08); }

.progress-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  color: var(--accent-green);
  background: rgba(34,197,94,0.1);
  border: 1px solid rgba(34,197,94,0.2);
  padding: 6px 14px;
  border-radius: 20px;
}

/* ============ MAIN LAYOUT ============ */
.main {
  max-width: 1400px;
  margin: 0 auto;
  padding: 2rem;
}

/* ============ DASHBOARD ============ */
.dashboard-hero {
  text-align: center;
  padding: 3rem 0 2rem;
}

.dashboard-hero h1 {
  font-size: 3rem;
  font-weight: 900;
  letter-spacing: -1.5px;
  margin-bottom: 0.75rem;
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue), var(--accent-purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.dashboard-hero p {
  font-size: 1.15rem;
  color: var(--text-secondary);
  max-width: 600px;
  margin: 0 auto;
  line-height: 1.6;
}

.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1rem;
  margin: 2rem 0;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.25rem;
  text-align: center;
  transition: all 0.3s;
}

.stat-card:hover { border-color: var(--accent-cyan); box-shadow: var(--glow-cyan); transform: translateY(-2px); }
.stat-number { font-family: 'JetBrains Mono', monospace; font-size: 2rem; font-weight: 700; color: var(--accent-cyan); }
.stat-label { color: var(--text-secondary); font-size: 0.85rem; margin-top: 4px; }

/* Module Grid */
.modules-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 1rem;
  margin-top: 2rem;
}

.module-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1.5rem;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.module-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
  opacity: 0;
  transition: opacity 0.3s;
}

.module-card:hover { border-color: var(--accent-cyan); box-shadow: var(--glow-cyan); transform: translateY(-3px); }
.module-card:hover::before { opacity: 1; }

.module-number {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--accent-cyan);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 8px;
}

.module-card h3 { font-size: 1.15rem; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.3px; }
.module-card p { color: var(--text-secondary); font-size: 0.9rem; line-height: 1.5; margin-bottom: 12px; }

.module-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 12px;
}

.module-difficulty {
  font-size: 0.75rem;
  padding: 4px 10px;
  border-radius: 20px;
  font-weight: 600;
}

.diff-beginner { color: var(--accent-green); background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); }
.diff-intermediate { color: var(--accent-orange); background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); }
.diff-advanced { color: var(--accent-red); background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); }

.module-progress-bar {
  flex: 1;
  height: 4px;
  background: var(--bg-tertiary);
  border-radius: 2px;
  margin-left: 16px;
  overflow: hidden;
}

.module-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue));
  border-radius: 2px;
  transition: width 0.5s ease;
}

/* ============ MODULE DETAIL VIEW ============ */
.module-detail { animation: fadeIn 0.3s ease; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 10px 20px;
  border-radius: 10px;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 0.9rem;
  transition: all 0.2s;
  margin-bottom: 1.5rem;
}

.back-btn:hover { color: var(--accent-cyan); border-color: var(--accent-cyan); }

.module-header {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 2rem;
  margin-bottom: 1.5rem;
}

.module-header h1 {
  font-size: 2rem;
  font-weight: 800;
  letter-spacing: -1px;
  margin-bottom: 0.5rem;
}

.analogy-box {
  background: linear-gradient(135deg, rgba(0,229,255,0.05), rgba(168,85,247,0.05));
  border: 1px solid rgba(0,229,255,0.15);
  border-radius: 12px;
  padding: 1.25rem;
  margin: 1.25rem 0;
}

.analogy-box .label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--accent-cyan);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 8px;
}

.analogy-box p { color: var(--text-primary); font-size: 0.95rem; line-height: 1.6; }

/* Section tabs */
.section-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 1.5rem;
  background: var(--bg-secondary);
  border-radius: 12px;
  padding: 4px;
  border: 1px solid var(--border);
}

.section-tab {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: transparent;
  color: var(--text-secondary);
  font-family: 'Outfit', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.section-tab.active { background: var(--bg-card); color: var(--accent-cyan); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.section-tab:hover:not(.active) { color: var(--text-primary); }

/* Content sections */
.content-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 2rem;
}

.concept-block {
  margin-bottom: 2rem;
  padding-bottom: 2rem;
  border-bottom: 1px solid var(--border);
}

.concept-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

.concept-block h3 {
  font-size: 1.2rem;
  font-weight: 700;
  margin-bottom: 0.75rem;
  color: var(--accent-cyan);
}

.concept-block p, .concept-block li {
  color: var(--text-secondary);
  font-size: 0.95rem;
  line-height: 1.7;
}

.concept-block ul {
  list-style: none;
  padding-left: 0;
}

.concept-block li {
  padding: 6px 0 6px 20px;
  position: relative;
}

.concept-block li::before {
  content: '▸';
  position: absolute;
  left: 0;
  color: var(--accent-cyan);
  font-weight: bold;
}

.key-term {
  display: inline-block;
  background: rgba(0,229,255,0.08);
  color: var(--accent-cyan);
  padding: 2px 8px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
}

.tip-box {
  background: rgba(34,197,94,0.06);
  border-left: 3px solid var(--accent-green);
  padding: 1rem 1.25rem;
  border-radius: 0 8px 8px 0;
  margin: 1rem 0;
}

.tip-box .tip-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--accent-green);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 4px;
}

.warning-box {
  background: rgba(245,158,11,0.06);
  border-left: 3px solid var(--accent-orange);
  padding: 1rem 1.25rem;
  border-radius: 0 8px 8px 0;
  margin: 1rem 0;
}

.warning-box .warn-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--accent-orange);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 4px;
}

/* ============ QUIZ ============ */
.quiz-container { animation: fadeIn 0.3s ease; }

.quiz-question {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 2rem;
  margin-bottom: 1rem;
}

.quiz-progress {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-bottom: 12px;
}

.quiz-question h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1.25rem; line-height: 1.5; }

.quiz-options { display: flex; flex-direction: column; gap: 8px; }

.quiz-option {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  border: 1px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--bg-secondary);
  font-size: 0.95rem;
  line-height: 1.5;
}

.quiz-option:hover { border-color: var(--accent-cyan); background: var(--bg-hover); }

.quiz-option.selected { border-color: var(--accent-blue); background: rgba(77,124,255,0.08); }
.quiz-option.correct { border-color: var(--accent-green); background: rgba(34,197,94,0.08); color: var(--accent-green); }
.quiz-option.incorrect { border-color: var(--accent-red); background: rgba(239,68,68,0.08); color: var(--accent-red); }

.quiz-option .letter {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  font-weight: 600;
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  flex-shrink: 0;
}

.quiz-option.correct .letter { background: var(--accent-green); color: var(--bg-primary); }
.quiz-option.incorrect .letter { background: var(--accent-red); color: white; }

.quiz-explanation {
  margin-top: 1rem;
  padding: 1rem;
  background: rgba(0,229,255,0.05);
  border: 1px solid rgba(0,229,255,0.1);
  border-radius: 10px;
  color: var(--text-secondary);
  font-size: 0.9rem;
  line-height: 1.6;
}

.quiz-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 28px;
  border-radius: 10px;
  border: none;
  font-family: 'Outfit', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 1rem;
}

.quiz-btn-primary {
  background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
  color: var(--bg-primary);
}

.quiz-btn-primary:hover { transform: translateY(-1px); box-shadow: var(--glow-cyan); }

.quiz-btn-secondary {
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border: 1px solid var(--border);
}

.quiz-btn-secondary:hover { border-color: var(--accent-cyan); }

/* Score card */
.score-card {
  text-align: center;
  padding: 3rem;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
}

.score-card .score-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 4rem;
  font-weight: 700;
}

.score-card .score-value.pass { color: var(--accent-green); }
.score-card .score-value.fail { color: var(--accent-orange); }
.score-card .score-message { color: var(--text-secondary); font-size: 1.1rem; margin-top: 8px; }

/* ============ ROADMAP ============ */
.roadmap-container {
  position: relative;
  padding: 2rem 0;
}

.roadmap-line {
  position: absolute;
  left: 24px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: linear-gradient(180deg, var(--accent-cyan), var(--accent-purple), var(--accent-green));
  opacity: 0.3;
}

.roadmap-item {
  position: relative;
  padding-left: 60px;
  margin-bottom: 2rem;
}

.roadmap-dot {
  position: absolute;
  left: 16px;
  top: 8px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 3px solid var(--accent-cyan);
  background: var(--bg-primary);
}

.roadmap-dot.complete { background: var(--accent-cyan); }

.roadmap-item .phase-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--accent-purple);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 4px;
}

.roadmap-item h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
.roadmap-item p { color: var(--text-secondary); font-size: 0.9rem; line-height: 1.5; }

/* ============ RESPONSIVE ============ */
@media (max-width: 768px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .modules-grid { grid-template-columns: 1fr; }
  .dashboard-hero h1 { font-size: 2rem; }
  .nav-tabs { display: none; }
  .main { padding: 1rem; }
  .section-tabs { flex-wrap: wrap; }
}

/* Hidden class */
.hidden { display: none !important; }
</style>
</head>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;

// ===== Icons =====
const ArrowLeft = () => <span style={{fontSize:'1.1em'}}>←</span>;
const CheckCircle = () => <span style={{color:'var(--accent-green)',fontSize:'1.1em'}}>✓</span>;
const XCircle = () => <span style={{color:'var(--accent-red)',fontSize:'1.1em'}}>✗</span>;

// ===== MAIN APP =====
function App() {
  const [view, setView] = useState('dashboard'); // dashboard | module | quiz | roadmap
  const [activeModule, setActiveModule] = useState(null);
  const [activeSection, setActiveSection] = useState('learn');
  const [progress, setProgress] = useState(() => {
    try { return JSON.parse(localStorage.getItem('az104_progress') || '{}'); } catch { return {}; }
  });

  useEffect(() => {
    try { localStorage.setItem('az104_progress', JSON.stringify(progress)); } catch {}
  }, [progress]);

  const markComplete = (moduleId, section) => {
    setProgress(p => ({
      ...p,
      [moduleId]: { ...(p[moduleId]||{}), [section]: true }
    }));
  };

  const getModuleProgress = (moduleId) => {
    const mp = progress[moduleId] || {};
    const total = 2; // learn + quiz
    const done = (mp.learn ? 1 : 0) + (mp.quiz ? 1 : 0);
    return Math.round((done / total) * 100);
  };

  const totalProgress = useMemo(() => {
    const total = MODULES.length * 2;
    let done = 0;
    MODULES.forEach(m => {
      const mp = progress[m.id] || {};
      if (mp.learn) done++;
      if (mp.quiz) done++;
    });
    return Math.round((done / total) * 100);
  }, [progress]);

  const completedModules = MODULES.filter(m => getModuleProgress(m.id) === 100).length;
  const totalQuizzesPassed = MODULES.filter(m => (progress[m.id]||{}).quiz).length;

  const openModule = (mod) => {
    setActiveModule(mod);
    setActiveSection('learn');
    setView('module');
  };

  return (
    <div>
      <header className="header">
        <div className="header-inner">
          <div className="logo">
            <div className="logo-icon">Az</div>
            AZ-104 <span>// Study Platform</span>
          </div>
          <nav className="nav-tabs">
            <button className={`nav-tab ${view==='dashboard'?'active':''}`} onClick={()=>setView('dashboard')}>Dashboard</button>
            <button className={`nav-tab ${view==='roadmap'?'active':''}`} onClick={()=>setView('roadmap')}>Roadmap</button>
          </nav>
          <div className="progress-badge">{totalProgress}% Complete</div>
        </div>
      </header>
      <main className="main">
        {view === 'dashboard' && (
          <Dashboard
            modules={MODULES}
            openModule={openModule}
            totalProgress={totalProgress}
            completedModules={completedModules}
            totalQuizzesPassed={totalQuizzesPassed}
            getModuleProgress={getModuleProgress}
          />
        )}
        {view === 'module' && activeModule && (
          <ModuleDetail
            module={activeModule}
            activeSection={activeSection}
            setActiveSection={setActiveSection}
            onBack={() => setView('dashboard')}
            markComplete={markComplete}
            progress={progress[activeModule.id] || {}}
            setView={setView}
          />
        )}
        {view === 'roadmap' && <Roadmap completedModules={completedModules} />}
      </main>
    </div>
  );
}

// ===== DASHBOARD =====
function Dashboard({ modules, openModule, totalProgress, completedModules, totalQuizzesPassed, getModuleProgress }) {
  return (
    <div>
      <div className="dashboard-hero">
        <h1>Master Azure Administration</h1>
        <p>A structured learning path from cloud fundamentals to confidently passing the AZ-104 exam. Built from the official Microsoft Learning labs.</p>
      </div>
      <div className="stats-row">
        <div className="stat-card">
          <div className="stat-number">{totalProgress}%</div>
          <div className="stat-label">Overall Progress</div>
        </div>
        <div className="stat-card">
          <div className="stat-number">{completedModules}/{modules.length}</div>
          <div className="stat-label">Modules Complete</div>
        </div>
        <div className="stat-card">
          <div className="stat-number">{totalQuizzesPassed}</div>
          <div className="stat-label">Quizzes Passed</div>
        </div>
        <div className="stat-card">
          <div className="stat-number">{modules.reduce((sum, m) => sum + m.quiz.length, 0)}</div>
          <div className="stat-label">Practice Questions</div>
        </div>
      </div>
      <div className="modules-grid">
        {modules.map(m => (
          <div key={m.id} className="module-card" onClick={() => openModule(m)}>
            <div className="module-number">{m.number}</div>
            <h3>{m.title}</h3>
            <p>{m.subtitle}</p>
            <div className="module-meta">
              <span className={`module-difficulty diff-${m.difficulty}`}>{m.difficulty}</span>
              <div className="module-progress-bar">

}

// ===== QUIZ SECTION =====
function QuizSection({ module, markComplete, isComplete }) {
  const [current, setCurrent] = useState(0);
  const [selected, setSelected] = useState(null);
  const [showAnswer, setShowAnswer] = useState(false);
  const [score, setScore] = useState(0);
  const [finished, setFinished] = useState(false);
  const [answers, setAnswers] = useState([]);

  const questions = module.quiz;
  const q = questions[current];
  const letters = ['A','B','C','D'];

  const handleSelect = (idx) => {
    if (showAnswer) return;
    setSelected(idx);
  };

  const handleCheck = () => {
    if (selected === null) return;
    setShowAnswer(true);
    if (selected === q.correct) {
      setScore(s => s + 1);
    }
    setAnswers(a => [...a, { selected, correct: q.correct }]);
  };

  const handleNext = () => {
    if (current < questions.length - 1) {
      setCurrent(c => c + 1);
      setSelected(null);
      setShowAnswer(false);
    } else {
      setFinished(true);
      const finalScore = score + (selected === q.correct ? 0 : 0); // score already updated
      const pct = Math.round((score / questions.length) * 100);
      if (pct >= 70) markComplete();
    }
  };

  const restart = () => {
    setCurrent(0); setSelected(null); setShowAnswer(false); setScore(0); setFinished(false); setAnswers([]);
  };

  if (finished) {
    const pct = Math.round((score / questions.length) * 100);
    const passed = pct >= 70;
    return (
      <div className="score-card">
        <div className={`score-value ${passed?'pass':'fail'}`}>{pct}%</div>
        <div className="score-message">
          {passed ? '🎉 Passed! You scored ' + score + '/' + questions.length + '. Great job!' : '📚 You scored ' + score + '/' + questions.length + '. Need 70% to pass. Review and try again!'}
        </div>
        <div style={{marginTop:'1.5rem', display:'flex', gap:'12px', justifyContent:'center'}}>
          <button className="quiz-btn quiz-btn-secondary" onClick={restart}>Retake Quiz</button>
        </div>
      </div>
    );
  }

  return (
    <div className="quiz-container">
      <div className="quiz-question">
        <div className="quiz-progress">Question {current+1} of {questions.length} • Score: {score}/{current}</div>
        <h3>{q.q}</h3>
        <div className="quiz-options">
          {q.options.map((opt, i) => {
            let cls = 'quiz-option';
            if (showAnswer && i === q.correct) cls += ' correct';
            else if (showAnswer && i === selected && i !== q.correct) cls += ' incorrect';
            else if (!showAnswer && i === selected) cls += ' selected';
            return (
              <div key={i} className={cls} onClick={() => handleSelect(i)}>
                <span className="letter">{letters[i]}</span>
                <span>{opt}</span>
              </div>
            );
          })}
        </div>
        {showAnswer && (
          <div className="quiz-explanation">
            <strong>{selected === q.correct ? '✅ Correct!' : '❌ Incorrect.'}</strong> {q.explanation}
          </div>
        )}
        <div style={{display:'flex', gap:'12px', marginTop:'1rem'}}>
          {!showAnswer && (
            <button className="quiz-btn quiz-btn-primary" onClick={handleCheck} disabled={selected===null}
              style={{opacity: selected===null ? 0.5 : 1}}>
              Check Answer
            </button>
          )}
          {showAnswer && (
            <button className="quiz-btn quiz-btn-primary" onClick={handleNext}>
              {current < questions.length - 1 ? 'Next Question →' : 'See Results'}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}
